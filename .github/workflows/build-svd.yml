name: Build & Push Self-Hosted SVD Image

# Builds the internal video-generation model's RunPod Serverless image
# (see _svd_src/) on GitHub's own runners instead of a local machine —
# ample disk space, no WSL2/VHDX involved, no local Docker Desktop
# quirks. Triggered on changes to _svd_src/ or manually via the Actions
# tab (workflow_dispatch) for a rebuild without touching any file.
on:
  push:
    branches: [master]
    paths:
      - '_svd_src/**'
      - '.github/workflows/build-svd.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./_svd_src
          file: ./_svd_src/Dockerfile.runpod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/careerstudio-svd:v1,${{ secrets.DOCKERHUB_USERNAME }}/careerstudio-svd:latest
