# ═══════════════════════════════════════════════════════════════════════
# CAREERSTUDIOMAX.COM — Nginx DNS / Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════════════
#
# DNS Records required (set in your domain registrar / Cloudflare):
#
#   Type  Name                   Value               TTL
#   ────  ─────────────────────  ──────────────────  ───
#   A     careerstudiomax.com        <YOUR_SERVER_IP>    300
#   A     api.careerstudiomax.com    <YOUR_SERVER_IP>    300
#   A     llm.careerstudiomax.com    <YOUR_SERVER_IP>    300
#   A     vlm.careerstudiomax.com    <YOUR_SERVER_IP>    300
#   A     voice.careerstudiomax.com  <YOUR_SERVER_IP>    300
#   A     embed.careerstudiomax.com  <YOUR_SERVER_IP>    300
#   A     bert.careerstudiomax.com   <YOUR_SERVER_IP>    300
#   A     app.careerstudiomax.com    <YOUR_SERVER_IP>    300
#   A     dev.careerstudiomax.com    <YOUR_SERVER_IP>    300
#
# SSL: Use Certbot / Let's Encrypt
#   certbot --nginx -d careerstudiomax.com -d *.careerstudiomax.com
#
# ═══════════════════════════════════════════════════════════════════════

# ── Upstreams ──────────────────────────────────────────────
upstream careercamp_gateway {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream careerstudio_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream careercamp_mlserver {
    server 127.0.0.1:3003;
    keepalive 8;
}

upstream ollama_server {
    server 127.0.0.1:11434;
}

# ── Rate limiting zones ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=20r/m;
limit_req_zone $http_authorization zone=auth_limit:10m rate=120r/m;

# ── Main app — careerstudiomax.com ─────────────────────────────
server {
    listen 443 ssl http2;
    server_name careerstudiomax.com www.careerstudiomax.com app.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Powered-By "CareerCamp AI";

    client_max_body_size 50M;

    location / {
        proxy_pass         http://careerstudio_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # SSE streaming — no buffering
    location ~* /api/.*/stream {
        proxy_pass         http://careerstudio_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Cache-Control no-cache;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
        limit_req zone=stream_limit burst=5 nodelay;
    }
}

# ── CareerCamp AI Gateway — api.careerstudiomax.com ────────────
server {
    listen 443 ssl http2;
    server_name api.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;

    add_header Access-Control-Allow-Origin  * always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header X-CareerCamp-Engine "CSTM-1 Gateway";

    client_max_body_size 20M;

    if ($request_method = OPTIONS) { return 204; }

    location / {
        proxy_pass         http://careercamp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        limit_req zone=api_limit burst=30 nodelay;
    }

    location ~* /v1/(chat/completions|audio|images) {
        proxy_pass         http://careercamp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
        limit_req zone=stream_limit burst=10 nodelay;
    }
}

# ── LLM endpoint — llm.careerstudiomax.com ────────────────────
server {
    listen 443 ssl http2;
    server_name llm.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;

    add_header Access-Control-Allow-Origin * always;
    add_header X-CareerCamp-Model "CareerLM";

    location / {
        proxy_pass         http://careercamp_gateway/v1/chat/completions;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
        limit_req zone=auth_limit burst=20 nodelay;
    }
}

# ── VLM endpoint — vlm.careerstudiomax.com ────────────────────
server {
    listen 443 ssl http2;
    server_name vlm.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;

    client_max_body_size 20M;
    add_header X-CareerCamp-Model "CareerVision";

    location / {
        proxy_pass         http://careercamp_gateway/v1/images;
        proxy_http_version 1.1;
        proxy_read_timeout 180s;
        limit_req zone=api_limit burst=10 nodelay;
    }
}

# ── Voice endpoint — voice.careerstudiomax.com ─────────────────
server {
    listen 443 ssl http2;
    server_name voice.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;

    client_max_body_size 50M;
    add_header X-CareerCamp-Model "CareerVoice";

    location / {
        proxy_pass         http://careercamp_gateway/v1/audio;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        limit_req zone=api_limit burst=15 nodelay;
    }
}

# ── Embeddings — embed.careerstudiomax.com ─────────────────────
server {
    listen 443 ssl http2;
    server_name embed.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;

    add_header X-CareerCamp-Model "CareerEmbed";

    location / {
        proxy_pass         http://careercamp_gateway/v1/embeddings;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        limit_req zone=api_limit burst=50 nodelay;
    }
}

# ── BERT — bert.careerstudiomax.com ────────────────────────────
server {
    listen 443 ssl http2;
    server_name bert.careerstudiomax.com;

    ssl_certificate     /etc/letsencrypt/live/careerstudiomax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerstudiomax.com/privkey.pem;

    add_header X-CareerCamp-Model "CareerBERT";

    location / {
        proxy_pass         http://careercamp_gateway/v1/bert;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        limit_req zone=api_limit burst=100 nodelay;
    }
}

# ── HTTP redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name careerstudiomax.com www.careerstudiomax.com api.careerstudiomax.com
                llm.careerstudiomax.com vlm.careerstudiomax.com voice.careerstudiomax.com
                embed.careerstudiomax.com bert.careerstudiomax.com;
    return 301 https://$host$request_uri;
}
